<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

// ═══════════════════════════════════════════════════════════════
// STORE — localStorage persistence
// ═══════════════════════════════════════════════════════════════
const LS = { LISTINGS:'xc_listings_v3', OFFERS:'xc_offers_v3', TXS:'xc_txs_v3' };
const getListings  = () => { try { return JSON.parse(localStorage.getItem(LS.LISTINGS)||'[]'); } catch { return []; } };
const saveListingDB = l => { const a=getListings(); a.unshift(l); localStorage.setItem(LS.LISTINGS,JSON.stringify(a)); return l; };
const updateListing = (id,u) => { const a=getListings(); const i=a.findIndex(x=>x.id===id); if(i<0)return; a[i]={...a[i],...u}; localStorage.setItem(LS.LISTINGS,JSON.stringify(a)); return a[i]; };
const getOffers    = () => { try { return JSON.parse(localStorage.getItem(LS.OFFERS)||'[]'); } catch { return []; } };
const saveOfferDB  = o => { const a=getOffers(); a.unshift(o); localStorage.setItem(LS.OFFERS,JSON.stringify(a)); return o; };
const updateOffer  = (id,u) => { const a=getOffers(); const i=a.findIndex(x=>x.id===id); if(i<0)return; a[i]={...a[i],...u}; localStorage.setItem(LS.OFFERS,JSON.stringify(a)); return a[i]; };
const getTxHistory = () => { try { return JSON.parse(localStorage.getItem(LS.TXS)||'[]'); } catch { return []; } };
const saveTx       = t => { const a=getTxHistory(); a.unshift(t); localStorage.setItem(LS.TXS,JSON.stringify(a)); return t; };
const genId = p => p + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,6).toUpperCase();

// ═══════════════════════════════════════════════════════════════
// CHAT — private p2p messages in localStorage
// ═══════════════════════════════════════════════════════════════
const roomKey = (a,b,lid) => { const [x,y]=[a,b].sort(); return `xc_chat_${x}_${y}_${lid}`; };
const getMessages = (a,b,lid) => { try { return JSON.parse(localStorage.getItem(roomKey(a,b,lid))||'[]'); } catch { return []; } };
const sendMsg = (a,b,lid,text) => { const k=roomKey(a,b,lid); const m=getMessages(a,b,lid); const msg={id:Date.now()+'_'+Math.random().toString(36).slice(2),from:a,text:text.trim(),ts:Date.now()}; m.push(msg); localStorage.setItem(k,JSON.stringify(m)); return msg; };
const getMyChats = addr => {
  const rooms=[]; for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(!k?.startsWith('xc_chat_')||!k.includes(addr))continue;
    try{ const msgs=JSON.parse(localStorage.getItem(k)||'[]'); if(!msgs.length)continue;
      const parts=k.replace('xc_chat_','').split('_');
      const lid=parts.slice(2).join('_'); const other=parts[0]===addr?parts[1]:parts[0];
      rooms.push({key:k,listingId:lid,otherAddr:other,msgs,lastMsg:msgs[msgs.length-1]});
    }catch{}
  }
  return rooms.sort((a,b)=>b.lastMsg.ts-a.lastMsg.ts);
};

// ═══════════════════════════════════════════════════════════════
// OP_NET / WALLET helpers
// ═══════════════════════════════════════════════════════════════
const TREASURY = 'opt1ppzns4t303qwj2vwlhqeju8hh6pcknq7pkmre24wag74h9s7pscnq4dvsyc';
const FLAT_FEE = 4478; // ~$3 at $67k BTC
const isWalletInstalled = () => typeof window !== 'undefined' && !!window.opnet;
const satsToBtc = s => { if(!s&&s!==0)return'—'; const b=Number(s)/1e8; return b===0?'0 BTC':b.toFixed(8).replace(/\.?0+$/,'')+' BTC'; };
const btcToSats = b => { if(!b)return 0; return Math.round(parseFloat(b)*1e8); };
const shortAddr = a => { if(!a)return''; return a.length>14?`${a.slice(0,8)}…${a.slice(-6)}`:a; };
const explorerAddr = a => `https://opscan.org/address/${a}?network=op_testnet`;

const KNOWN_TOKENS = [
  { address:'opt1sqzkx6wm5acawl9m6nay2mjsm6wagv7gazcgtczds', name:'Motoswap', symbol:'MOTO', emoji:'🏍️', description:'Motoswap governance token' },
  { address:'opt1p5kzh0gjfkpnp8gek7k6ttlmhz7p0qzh5ry3jkp',  name:'Pills Token', symbol:'PILLS', emoji:'💊', description:'Pills token on OP_NET' },
];

async function connectWallet() {
  if(!isWalletInstalled()) throw new Error('OP_WALLET not installed. Get it at opnet.org/wallet');
  const accounts = await window.opnet.requestAccounts();
  if(!accounts?.length) throw new Error('No accounts returned');
  const network = await window.opnet.getNetwork?.().catch(()=>'testnet');
  return { address: accounts[0], network };
}

async function payFee(action) {
  if(!isWalletInstalled()) throw new Error('OP_WALLET not connected');
  const methods = [
    ()=>window.opnet.sendBitcoin({to:TREASURY,amount:FLAT_FEE}),
    ()=>window.opnet.sendBitcoin(TREASURY,FLAT_FEE),
    ()=>window.opnet.send({to:TREASURY,value:FLAT_FEE}),
    ()=>window.opnet.sendTransaction({to:TREASURY,value:FLAT_FEE}),
    ()=>window.opnet.transfer({to:TREASURY,amount:FLAT_FEE}),
  ];
  let lastErr;
  for(const m of methods){
    try{ const tx=await m(); const txid=tx?.txid||tx?.hash||tx?.id||tx; if(txid) return {txid:String(txid),success:true}; }
    catch(e){ lastErr=e;
      if(e.message?.toLowerCase().match(/reject|denied|cancel/)) throw new Error('Fee payment cancelled.');
    }
  }
  console.warn('Fee tx not available:',lastErr?.message);
  return {txid:null,success:false};
}

function isValidAddr(addr) {
  if(!addr) return false;
  if(addr.startsWith('opt1')) return addr.length>=40&&addr.length<=70&&/^opt1[ac-hj-np-z02-9]+$/i.test(addr);
  if(addr.startsWith('0x'))   return addr.length===42&&/^0x[0-9a-fA-F]{40}$/.test(addr);
  return false;
}
async function validateToken(addr) {
  const a=addr?.trim();
  if(!a) return {valid:false,error:'Enter a contract address'};
  const known=KNOWN_TOKENS.find(t=>t.address.toLowerCase()===a.toLowerCase());
  if(known) return {valid:true,...known};
  if(!isValidAddr(a)) return {valid:false,error:'Invalid format — must start with "opt1" (40+ chars) or "0x" (42 chars)'};
  return {valid:true,name:null,symbol:null,unverified:true};
}

// ═══════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════
function timeAgo(ts) {
  const d=(Date.now()-ts)/1000;
  if(d<60) return 'just now';
  if(d<3600) return `${Math.floor(d/60)}m ago`;
  if(d<86400) return `${Math.floor(d/3600)}h ago`;
  return `${Math.floor(d/86400)}d ago`;
}

// ═══════════════════════════════════════════════════════════════
// HOOKS
// ═══════════════════════════════════════════════════════════════
const { useState, useEffect, useCallback, useRef } = React;

function useWallet() {
  const [wallet,     setWallet]     = useState(null);
  const [connecting, setConnecting] = useState(false);
  const [error,      setError]      = useState('');

  const connect = async () => {
    setConnecting(true); setError('');
    try { const w=await connectWallet(); setWallet(w); }
    catch(e) { setError(e.message); }
    finally { setConnecting(false); }
  };
  const disconnect = () => setWallet(null);

  return { wallet, connecting, error, installed: isWalletInstalled(), connect, disconnect };
}

function useListingsHook(wallet) {
  const [listings,  setListings]  = useState([]);
  const [offers,    setOffers]    = useState([]);
  const [txHistory, setTxHistory] = useState([]);
  const [loading,   setLoading]   = useState('');

  const refresh = useCallback(() => {
    setListings(getListings()); setOffers(getOffers()); setTxHistory(getTxHistory());
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  const createListing = useCallback(async (data) => {
    setLoading('creating');
    try {
      await payFee('listing');
      const id=genId('L');
      saveListingDB({...data,id,seller:wallet?.address,status:'active',posted:Date.now()});
      saveTx({id:genId('TX'),listingId:id,type:'listing_fee',actor:wallet?.address,fee:FLAT_FEE,date:Date.now()});
      refresh(); return {success:true};
    } finally { setLoading(''); }
  }, [wallet, refresh]);

  const cancelListing = useCallback((id) => {
    updateListing(id,{status:'cancelled'}); refresh();
  }, [refresh]);

  const buyListing = useCallback(async (listing) => {
    setLoading('buy_'+listing.id);
    try {
      await payFee('buy');
      updateListing(listing.id,{status:'pending_transfer',buyerAddress:wallet?.address,buyerAt:Date.now()});
      saveTx({id:genId('TX'),listingId:listing.id,type:'buy_fee',buyer:wallet?.address,seller:listing.seller,fee:FLAT_FEE,date:Date.now()});
      refresh(); return {success:true,chatWith:listing.seller};
    } finally { setLoading(''); }
  }, [wallet, refresh]);

  const makeOffer = useCallback(async (listingId,listingName,sellerAddr,btcAmount) => {
    setLoading('offer_'+listingId);
    try {
      await payFee('offer');
      const id=genId('O');
      saveOfferDB({id,listingId,listingName,from:wallet?.address,sellerAddress:sellerAddr,amount:btcToSats(btcAmount),amountDisplay:btcAmount,status:'pending',date:Date.now()});
      saveTx({id:genId('TX'),offerId:id,listingId,type:'offer_fee',actor:wallet?.address,fee:FLAT_FEE,date:Date.now()});
      refresh(); return {success:true,offerId:id};
    } finally { setLoading(''); }
  }, [wallet, refresh]);

  const acceptOffer = useCallback(async (offerId) => {
    setLoading('accept_'+offerId);
    try {
      const offer=getOffers().find(o=>o.id===offerId);
      updateOffer(offerId,{status:'accepted',acceptedAt:Date.now()});
      if(offer){ updateListing(offer.listingId,{status:'pending_transfer',buyerAddress:offer.from,acceptedOfferId:offerId}); }
      refresh(); return {success:true,chatWith:offer?.from,listingId:offer?.listingId};
    } finally { setLoading(''); }
  }, [refresh]);

  const rejectOffer = useCallback((id) => { updateOffer(id,{status:'rejected'}); refresh(); }, [refresh]);

  const markComplete = useCallback((listingId) => {
    updateListing(listingId,{status:'sold',soldAt:Date.now()}); refresh();
  }, [refresh]);

  const addr = wallet?.address;
  const activeListings  = listings.filter(l=>l.status==='active'||l.status==='pending_transfer');
  const myListings      = listings.filter(l=>l.seller===addr);
  const myOffers        = offers.filter(o=>o.from===addr);
  const receivedOffers  = offers.filter(o=>{ const l=listings.find(x=>x.id===o.listingId); return l?.seller===addr&&o.status==='pending'; });

  return { listings, activeListings, myListings, myOffers, receivedOffers, offers, loading,
           createListing, cancelListing, buyListing, makeOffer, acceptOffer, rejectOffer, markComplete, refresh };
}

// ═══════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════
function useToast() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type='success') => {
    const id = Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)), 4000);
  }, []);
  return { toasts, add };
}

function ToastContainer({ toasts }) {
  return React.createElement('div', {
    style:{position:'fixed',bottom:24,right:24,zIndex:9999,display:'flex',flexDirection:'column',gap:8}
  }, toasts.map(t => React.createElement('div', {
    key: t.id,
    style:{
      background:'var(--bg2)',border:`1.5px solid ${t.type==='error'?'var(--red)':'var(--green)'}`,
      padding:'12px 16px',borderRadius:10,fontSize:13,boxShadow:'var(--card-shadow)',
      maxWidth:320,animation:'fadeIn 0.2s ease',fontFamily:'var(--font)'
    }
  }, t.msg)));
}

// ═══════════════════════════════════════════════════════════════
// PRIVATE CHAT COMPONENT
// ═══════════════════════════════════════════════════════════════
function PrivateChat({ myAddr, otherAddr, listingId, listingName, isSeller, onClose, onMarkComplete }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput]       = useState('');
  const bottomRef = useRef(null);
  const pollRef   = useRef(null);

  const load = useCallback(() => {
    setMessages(getMessages(myAddr, otherAddr, listingId));
  }, [myAddr, otherAddr, listingId]);

  useEffect(() => {
    load();
    pollRef.current = setInterval(load, 1500);
    return () => clearInterval(pollRef.current);
  }, [load]);

  useEffect(() => { bottomRef.current?.scrollIntoView({behavior:'smooth'}); }, [messages]);

  const handleSend = () => {
    const t = input.trim(); if(!t) return;
    sendMsg(myAddr, otherAddr, listingId, t);
    setInput(''); load();
  };

  const fmt = ts => new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

  const QUICK = [
    'My wallet address: ' + myAddr,
    'Send tokens first, I\'ll send BTC right after ✅',
    'Send BTC first, I\'ll send tokens right after ✅',
    'Transfer confirmed! Thank you 🎉',
    'Can we negotiate the price?',
  ];

  return React.createElement('div', {
    style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.78)',zIndex:600,display:'flex',alignItems:'center',justifyContent:'center',padding:16}
  },
    React.createElement('div', {
      style:{background:'var(--bg2)',border:'1.5px solid var(--border)',borderRadius:16,width:'100%',maxWidth:500,maxHeight:'90vh',display:'flex',flexDirection:'column',boxShadow:'0 24px 64px rgba(0,0,0,0.7)'}
    },
      // Header
      React.createElement('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 18px',borderBottom:'1px solid var(--border)',background:'var(--bg3)',borderRadius:'16px 16px 0 0'}},
        React.createElement('div', {style:{display:'flex',alignItems:'center',gap:10}},
          React.createElement('span', {style:{fontSize:22}}, '🔒'),
          React.createElement('div', null,
            React.createElement('div', {style:{fontWeight:800,fontSize:14}}, 'Private OTC Chat'),
            React.createElement('div', {style:{fontSize:11,color:'var(--muted)',fontFamily:'var(--mono)'}}, `${listingName} · ${shortAddr(otherAddr)}`)
          )
        ),
        React.createElement('div', {style:{display:'flex',gap:8,alignItems:'center'}},
          isSeller && onMarkComplete && React.createElement('button', {
            onClick: onMarkComplete,
            style:{background:'var(--green)',color:'#fff',border:'none',borderRadius:8,padding:'6px 12px',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'var(--font)'}
          }, '✅ Mark Complete'),
          React.createElement('button', {
            onClick: onClose,
            style:{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:20,padding:'2px 8px'}
          }, '✕')
        )
      ),
      // Warning
      React.createElement('div', {style:{padding:'10px 16px',background:'rgba(239,68,68,0.08)',borderBottom:'1px solid rgba(239,68,68,0.2)',fontSize:11,color:'var(--red)',lineHeight:1.6}},
        '⚠️ No escrow. Transfer directly wallet-to-wallet. XCHANGE does not hold funds.'
      ),
      // Messages
      React.createElement('div', {style:{flex:1,overflowY:'auto',padding:16,display:'flex',flexDirection:'column',gap:10,minHeight:180,maxHeight:300}},
        messages.length === 0 && React.createElement('div', {style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flex:1,color:'var(--muted)',gap:8,padding:32,textAlign:'center'}},
          React.createElement('span', {style:{fontSize:36}}, '💬'),
          React.createElement('div', {style:{fontWeight:700}}, 'Start the conversation'),
          React.createElement('div', {style:{fontSize:12,maxWidth:260,lineHeight:1.6}}, 'Share your wallet address and agree on who sends first.')
        ),
        messages.map(m => {
          const mine = m.from === myAddr;
          return React.createElement('div', {
            key: m.id,
            style:{display:'flex',flexDirection:'column',maxWidth:'80%',alignSelf:mine?'flex-end':'flex-start',alignItems:mine?'flex-end':'flex-start'}
          },
            React.createElement('div', {
              style:{padding:'10px 14px',borderRadius:mine?'14px 14px 4px 14px':'14px 14px 14px 4px',
                background:mine?'var(--orange)':'var(--bg3)',
                border:mine?'none':'1px solid var(--border)',
                color:mine?'#fff':'var(--text)',fontSize:13,lineHeight:1.5,wordBreak:'break-word',whiteSpace:'pre-wrap'}
            }, m.text),
            React.createElement('div', {style:{fontSize:10,color:'var(--muted)',marginTop:3,fontFamily:'var(--mono)'}},
              `${mine?'You':shortAddr(m.from)} · ${fmt(m.ts)}`)
          );
        }),
        React.createElement('div', {ref:bottomRef})
      ),
      // Quick replies
      React.createElement('div', {style:{padding:'8px 12px',borderTop:'1px solid var(--border)',display:'flex',gap:6,flexWrap:'wrap',background:'var(--bg3)'}},
        QUICK.map(q => React.createElement('button', {
          key:q, onClick:()=>setInput(q),
          style:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:99,padding:'3px 10px',fontSize:11,cursor:'pointer',color:'var(--muted)',fontFamily:'var(--font)'}
        }, q.length>38?q.slice(0,38)+'…':q))
      ),
      // Input
      React.createElement('div', {style:{display:'flex',gap:10,padding:'12px 14px',borderTop:'1px solid var(--border)',alignItems:'flex-end'}},
        React.createElement('textarea', {
          value:input, rows:2,
          onChange:e=>setInput(e.target.value),
          onKeyDown:e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();}},
          placeholder:'Type a message… (Enter to send)',
          style:{flex:1,background:'var(--bg3)',border:'1.5px solid var(--border)',borderRadius:10,color:'var(--text)',fontFamily:'var(--font)',fontSize:13,padding:'10px 12px',outline:'none',resize:'none'}
        }),
        React.createElement('button', {
          onClick:handleSend, disabled:!input.trim(),
          style:{background:'var(--orange)',color:'#fff',border:'none',borderRadius:10,padding:'10px 18px',fontWeight:700,cursor:'pointer',fontFamily:'var(--font)',fontSize:13,opacity:!input.trim()?0.45:1}
        }, 'Send')
      )
    )
  );
}

// ═══════════════════════════════════════════════════════════════
// MARKET PAGE
// ═══════════════════════════════════════════════════════════════
function MarketPage({ listings, offers, onSelect, onCreateListing, wallet }) {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');

  const filtered = listings.filter(l => {
    const s = search.toLowerCase();
    const match = !s || (l.name||'').toLowerCase().includes(s) || (l.symbol||'').toLowerCase().includes(s);
    const typeMatch = filter==='all' || l.type===filter;
    return match && typeMatch;
  });

  return React.createElement('div', {className:'fade-in'},
    // Hero
    React.createElement('div', {style:{background:'linear-gradient(135deg,var(--bg2),var(--bg3))',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'40px 28px',marginBottom:24,textAlign:'center',position:'relative',overflow:'hidden'}},
      React.createElement('div', {style:{position:'relative',zIndex:1}},
        React.createElement('div', {style:{fontSize:40,marginBottom:8}}, '₿'),
        React.createElement('h1', {style:{fontSize:'clamp(26px,5vw,44px)',fontWeight:800,lineHeight:1,marginBottom:8}},
          'X', React.createElement('span', {style:{color:'var(--orange)'}}, 'CHANGE')
        ),
        React.createElement('div', {style:{fontSize:12,color:'var(--muted)',fontFamily:'var(--mono)',marginBottom:14}}, 'OTC P2P · Bitcoin L1 · 🧪 Testnet'),

          'Trade OP_20 tokens & OP_721 NFTs directly against BTC. No middlemen. Private chats between buyer & seller.'
        ),
        React.createElement('div', {style:{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}},
          [['✅ Live','green'],['💬 Manual OTC','orange'],['🧪 Testnet','orange'],['⚡ Escrow Soon','red']].map(([t,c])=>
            React.createElement('span', {key:t,style:{background:`var(--${c}-dim)`,border:`1px solid var(--${c})`,color:`var(--${c})`,padding:'4px 14px',borderRadius:99,fontSize:11,fontFamily:'var(--mono)'}}, t)
          )
        )
      )
    ),
    // Filters + Create
    React.createElement('div', {style:{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap',alignItems:'center'}},
      React.createElement('div', {style:{flex:1,minWidth:200,position:'relative'}},
        React.createElement('input', {
          value:search, onChange:e=>setSearch(e.target.value),
          placeholder:'Search tokens, NFTs…',

  if(!installed) return React.createElement('a',{href:'https://opnet.org/wallet',target:'_blank',rel:'noopener',style:{background:'var(--orange)',color:'#fff',border:'none',borderRadius:10,padding:'9px 16px',fontWeight:700,cursor:'pointer',fontFamily:'var(--font)',fontSize:13,textDecoration:'none',display:'inline-block'}},'Install OP_WALLET');

  if(!wallet) return React.createElement('button',{
    onClick:onConnect, disabled:connecting,

      React.createElement('div',{style:{fontFamily:'var(--mono)',fontSize:11,color:'var(--muted)',wordBreak:'break-all',marginBottom:6}},wallet.address),
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--muted)',marginBottom:12}},

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════
const NAV = [
  {id:'market',label:'🏪 Market'},
  {id:'social',label:'🌐 Social OTC',badge:'SOON'},
  {id:'create',label:'➕ Create'},
  {id:'dashboard',label:'📊 Dashboard'},
  {id:'history',label:'📜 History'},
  {id:'learn',label:'📖 Learn'},
  {id:'about',label:'ℹ️ About'},
];

function App() {
  const [dark,     setDark]     = useState(true);
  const [tab,      setTab]      = useState('market');
  const [selected, setSelected] = useState(null);

  const { wallet, connecting, error, installed, connect, disconnect } = useWallet();
  const { activeListings, myListings, myOffers, receivedOffers, offers, loading,
          createListing, cancelListing, buyListing, makeOffer, acceptOffer, rejectOffer, markComplete } = useListingsHook(wallet);
  const { toasts, add: toast } = useToast();

  useEffect(() => {
    const s = localStorage.getItem('xc_dark');
    if(s!==null) setDark(s==='true');
  }, []);
  useEffect(() => {
    document.documentElement.className = dark?'':'light';
    localStorage.setItem('xc_dark', dark);
  }, [dark]);

  const go = t => { setTab(t); setSelected(null); };

  const handleCreate = async (data) => {
    try { await createListing(data); toast('✅ Listing live! $3 fee sent to treasury.'); go('market'); }
    catch(e) { toast('❌ '+e.message,'error'); }
  };
  const handleBuy = async (listing) => {
    try { const r=await buyListing(listing); toast('✅ $3 fee paid. Private chat opened!'); return r; }
    catch(e) { toast('❌ '+e.message,'error'); }
  };
  const handleOffer = async (lid,lname,seller,btc) => {
    try { const r=await makeOffer(lid,lname,seller,btc); toast('✅ $3 fee paid. Offer sent!'); return r; }
    catch(e) { toast('❌ '+e.message,'error'); }
  };
  const handleAcceptOffer = async (oid) => {
    try { const r=await acceptOffer(oid); toast('✅ Offer accepted! Private chat opened.'); return r; }
    catch(e) { toast('❌ '+e.message,'error'); }
  };
  const handleMarkComplete = (lid) => {
    markComplete(lid); toast('✅ Marked complete! Listing shows SOLD.');
  };

  const txHistory = getTxHistory().filter(t => {
    const addr = wallet?.address;
    return t.buyer===addr||t.seller===addr||t.actor===addr||myListings.some(l=>l.id===t.listingId);
  });

  return React.createElement('div', {style:{minHeight:'100vh',display:'flex',flexDirection:'column',fontFamily:'var(--font)'}},
    // Header
    React.createElement('header', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 20px',height:60,background:'var(--bg2)',borderBottom:'1px solid var(--border)',position:'sticky',top:0,zIndex:100}},
      React.createElement('div', {onClick:()=>go('market'),style:{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}},
        React.createElement('span',{style:{fontSize:28}},'₿'),
        React.createElement('div',null,
          React.createElement('div',{style:{fontSize:18,fontWeight:800,lineHeight:1}},
            'X',React.createElement('span',{style:{color:'var(--orange)'}},'CHANGE')
          ),
          React.createElement('div',{style:{fontSize:10,color:'var(--muted)',fontFamily:'var(--mono)'}},'OTC P2P · Bitcoin L1 · 🧪 Testnet')
        )
      ),
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
        React.createElement('button',{onClick:()=>setDark(d=>!d),style:{background:'none',border:'none',cursor:'pointer',fontSize:18,padding:'6px 8px',borderRadius:8}},dark?'☀️':'🌙'),
        React.createElement(WalletButton,{wallet,connecting,error,installed,onConnect:connect,onDisconnect:disconnect})
      )
    ),

    // Nav
    React.createElement('nav', {style:{display:'flex',gap:0,padding:'0 12px',background:'var(--bg2)',borderBottom:'1px solid var(--border)',overflowX:'auto',scrollbarWidth:'none'}},
      NAV.map(n=>React.createElement('button',{
        key:n.id,onClick:()=>go(n.id),
        style:{padding:'11px 12px',fontSize:12,fontWeight:600,cursor:'pointer',border:'none',background:'none',borderBottom:`2.5px solid ${tab===n.id&&!selected?'var(--orange)':'transparent'}`,color:tab===n.id&&!selected?'var(--orange)':'var(--muted)',transition:'all 0.15s',whiteSpace:'nowrap',fontFamily:'var(--font)',display:'flex',alignItems:'center',gap:4}
      },
        n.label,
        n.badge&&React.createElement('span',{style:{background:'var(--orange)',color:'#fff',fontSize:8,fontWeight:800,padding:'1px 5px',borderRadius:99,fontFamily:'var(--mono)'}},n.badge)
      ))
    ),

    // Main
    React.createElement('main',{style:{flex:1,padding:'20px 16px',maxWidth:1200,margin:'0 auto',width:'100%',boxSizing:'border-box'}},
      tab==='market'&&!selected&&React.createElement(MarketPage,{listings:activeListings,offers,onSelect:setSelected,onCreateListing:()=>go('create'),wallet}),
      tab==='market'&&selected&&React.createElement(ListingDetailPage,{listing:selected,offers,onBack:()=>setSelected(null),onBuy:handleBuy,onOffer:handleOffer,onAcceptOffer:handleAcceptOffer,onMarkComplete:handleMarkComplete,wallet,loading}),
      tab==='create'&&React.createElement(CreateListingPage,{wallet,onSubmit:handleCreate,onCancel:()=>go('market'),loading}),
      tab==='dashboard'&&React.createElement(DashboardPage,{wallet,myListings,myOffers,receivedOffers,offers,onCancel:cancelListing,onAcceptOffer:handleAcceptOffer,onRejectOffer:rejectOffer,onMarkComplete:handleMarkComplete,loading}),
      tab==='history'&&React.createElement(HistoryPage,{wallet,txHistory}),
      tab==='learn'&&React.createElement(LearnPage),
      tab==='about'&&React.createElement(AboutPage),
      tab==='social'&&React.createElement(SocialOTCPage)
    ),

    React.createElement(ToastContainer,{toasts})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
